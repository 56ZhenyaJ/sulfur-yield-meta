name: R pipeline

on:
  push:
  pull_request:

jobs:
  run-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install packages
        run: Rscript analysis/install_packages.R
      - name: Run synthetic demo pipeline
        run: Rscript analysis/run_pipeline.R

